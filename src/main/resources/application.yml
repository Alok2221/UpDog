spring:
  application:
    name: updog

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:updog}
    username: ${POSTGRES_USER:updog}
    password: ${POSTGRES_PASSWORD:updog}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
    ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration


server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# JWT
jwt:
  secret: ${JWT_SECRET:updog-super-secret-key-min-256-bits-for-hs256-please-change-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# App
app:
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  activation-code-expiration-minutes: 15
  password-reset-expiration-minutes: 20
  upload-dir: ${UPLOAD_DIR:./uploads}

logging:
  level:
    pl.updog: DEBUG
    org.springframework.security: DEBUG
